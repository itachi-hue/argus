<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>🔭 Argus</h1>

    <div id="status" class="status disconnected">
      <span class="dot"></span>
      <span id="status-text">Disconnected</span>
    </div>

    <!-- Step 1: Not connected — show connect options -->
    <div id="connect-section">
      <button id="pair-btn" class="btn-primary">Connect to Server</button>

      <div id="code-section" class="hidden">
        <p class="hint">Enter the 4-digit code from your terminal:</p>
        <div class="code-input-row">
          <input type="text" id="pair-code" maxlength="4" placeholder="0000" class="code-input" inputmode="numeric" pattern="[0-9]*">
          <button id="confirm-btn" class="btn-confirm">→</button>
        </div>
        <p id="pair-error" class="error hidden"></p>
      </div>

      <div class="divider"><span>or</span></div>

      <button id="paste-btn" class="btn-secondary">Paste Token from Clipboard</button>

      <details class="manual-section">
        <summary>Manual setup</summary>
        <div class="field">
          <label for="server-url">Server URL</label>
          <input type="text" id="server-url" placeholder="http://127.0.0.1:42777">
        </div>
        <div class="field">
          <label for="auth-token">Auth Token</label>
          <input type="password" id="auth-token" placeholder="Paste token here">
        </div>
        <button id="save-btn" class="btn-secondary">Save & Connect</button>
      </details>
    </div>

    <!-- Step 2: Connected — show controls -->
    <div id="connected-section" class="hidden">
      <div class="toggles">
        <label class="toggle">
          <input type="checkbox" id="capture-logs" checked>
          <span>Capture console logs</span>
        </label>
        <label class="toggle">
          <input type="checkbox" id="capture-network" checked>
          <span>Capture network</span>
        </label>
      </div>

      <button id="disconnect-btn" class="btn-danger">Disconnect</button>
    </div>

    <div class="hint">
      Hotkey: <kbd>Ctrl+Shift+L</kbd> to capture context
    </div>
  </div>

  <script src="../../dist/popup/popup.js" type="module"></script>
</body>
</html>
