<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="brand">
        <img src="../../icons/icon-48.png" alt="" class="logo">
        <div>
          <h1>Argus</h1>
          <span class="tagline">AI Agent Eyes</span>
        </div>
      </div>
      <div id="status" class="status-badge disconnected">
        <span class="status-dot"></span>
        <span id="status-text">Offline</span>
      </div>
    </div>

    <!-- Connect Section -->
    <div id="connect-section">
      <button id="pair-btn" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
        Connect to Server
      </button>

      <div id="code-section" class="hidden">
        <p class="hint">Enter the 4-digit code from your terminal:</p>
        <div class="code-input-row">
          <input type="text" id="pair-code" maxlength="4" placeholder="0000" class="code-input" inputmode="numeric" pattern="[0-9]*">
          <button id="confirm-btn" class="btn-confirm">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>
        </div>
        <p id="pair-error" class="error hidden"></p>
      </div>

      <div class="divider"><span>or</span></div>

      <button id="paste-btn" class="btn-ghost">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        Paste Token from Clipboard
      </button>

      <details class="manual-section">
        <summary>Manual setup</summary>
        <div class="field">
          <label for="server-url">Server URL</label>
          <input type="text" id="server-url" placeholder="http://127.0.0.1:42777">
        </div>
        <div class="field">
          <label for="auth-token">Auth Token</label>
          <input type="password" id="auth-token" placeholder="Paste token here">
        </div>
        <button id="save-btn" class="btn-ghost">Save & Connect</button>
      </details>
    </div>

    <!-- Connected Section -->
    <div id="connected-section" class="hidden">

      <!-- Screenshot Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon screenshot-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          </div>
          <span class="card-title">Auto Screenshots</span>
          <label class="switch">
            <input type="checkbox" id="auto-capture" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div id="capture-settings" class="card-body">
          <div class="setting-row">
            <span class="setting-label">Capture every</span>
            <div class="setting-control">
              <input type="number" id="capture-interval" min="10" max="300" value="30" class="num-input">
              <span class="setting-unit">sec</span>
            </div>
          </div>
          <div class="setting-row">
            <span class="setting-label">Keep last</span>
            <div class="setting-control">
              <input type="number" id="max-screenshots" min="3" max="50" value="15" class="num-input">
              <span class="setting-unit">shots</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Console Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon console-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          </div>
          <span class="card-title">Console & Errors</span>
          <label class="switch">
            <input type="checkbox" id="capture-logs" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Network Card -->
      <div class="card">
        <div class="card-header">
          <div class="card-icon network-icon">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
          </div>
          <span class="card-title">Network Traffic</span>
          <label class="switch">
            <input type="checkbox" id="capture-network" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <!-- Save indicator -->
      <div id="save-toast" class="save-toast hidden">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Saved
      </div>

      <button id="disconnect-btn" class="btn-disconnect">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Disconnect Session
      </button>
    </div>

    <div class="footer">
      <span class="footer-label">Capture hotkey</span>
      <kbd>Ctrl + Shift + L</kbd>
    </div>
  </div>

  <script src="../../dist/popup/popup.js" type="module"></script>
</body>
</html>
