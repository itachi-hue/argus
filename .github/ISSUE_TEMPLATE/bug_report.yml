name: Bug Report
description: Report a bug in Argus
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Argus is affected?
      options:
        - Chrome Extension
        - MCP Server
        - Both / Unsure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I try to X, Y happens instead of Z."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open the extension popup
        2. Click "Connect"
        3. ...
    validations:
      required: true

  - type: dropdown
    id: mcp-client
    attributes:
      label: MCP Client
      description: Which AI IDE / agent are you using?
      options:
        - Cursor
        - Claude Code (CLI)
        - Windsurf
        - Other
    validations:
      required: true

  - type: input
    id: chrome-version
    attributes:
      label: Chrome version
      placeholder: "e.g. 124.0.6367.91"

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "e.g. Windows 11, macOS 14.4, Ubuntu 24.04"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error messages, server logs, or screenshots here.
      render: shell

