name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-server:
    name: Server (pip install)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        working-directory: server
        run: pip install -e .

      - name: Verify import
        run: python -c "import argus; print(f'argus {argus.__version__}')"

  build-extension:
    name: Extension (esbuild)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: extension
        run: npm ci

      - name: Build
        working-directory: extension
        run: npm run build

      - name: Verify output
        run: |
          test -f extension/dist/background/index.js
          test -f extension/dist/content/index.js
          test -f extension/dist/injected/index.js
          test -f extension/dist/popup/popup.js
          echo "All build outputs present"
