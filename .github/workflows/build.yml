name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - run: npm ci
      - run: npm run build

      - name: Verify build output
        run: |
          test -f dist/background/index.js
          test -f dist/content/index.js
          test -f dist/injected/index.js
          test -f dist/popup/popup.js

  server:
    name: Python Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: pip install -e .

      - name: Verify import
        run: python -c "from argus.main import main; print('OK')"
